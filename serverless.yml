org: chittaworn
app: user-service-app
service: user-service

useDotenv: true

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-southeast-1
  stage: ${opt:stage, 'dev'}
  environment:
    DB_HOST: ${env:DB_HOST, 'localhost'}
    DB_USER: ${env:DB_USER, 'root'}
    DB_PASSWORD: ${env:DB_PASSWORD, ''}
    DB_NAME: ${env:DB_NAME, 'serverless_offline'}
    JWT_SECRET: ${env:JWT_SECRET, 'dev-secret-key'}
    JWT_EXPIRES_IN: ${env:JWT_EXPIRES_IN, '7d'}

custom:
  serverless-offline:
    httpPort: 3001

plugins:
  - serverless-offline

build:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true

functions:
  createUser:
    handler: src/presentation/handlers/UserHandler.createUser
    events:
      - httpApi:
          path: /${sls:stage}/users
          method: post
  listUsers:
    handler: src/presentation/handlers/UserHandler.listUsers
    events:
      - httpApi:
          path: /${sls:stage}/users
          method: get
  getUser:
    handler: src/presentation/handlers/UserHandler.getUser
    events:
      - httpApi:
          path: /${sls:stage}/users/{id}
          method: get
  findByEmail:
    handler: src/presentation/handlers/UserHandler.findByEmail
    events:
      - httpApi:
          path: /${sls:stage}/users/search
          method: get
  updateUser:
    handler: src/presentation/handlers/UserHandler.updateUser
    events:
      - httpApi:
          path: /${sls:stage}/users/{id}
          method: put
  deleteUser:
    handler: src/presentation/handlers/UserHandler.deleteUser
    events:
      - httpApi:
          path: /${sls:stage}/users/{id}
          method: delete

  register:
    handler: src/presentation/handlers/AuthHandler.register
    events:
      - httpApi:
          path: /${sls:stage}/auth/register
          method: post
  login:
    handler: src/presentation/handlers/AuthHandler.login
    events:
      - httpApi:
          path: /${sls:stage}/auth/login
          method: post
